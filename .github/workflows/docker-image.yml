name: Kubernetes CI
on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6
      - name: Build docker Image
        run: docker build -t eliassal/pyapp:${GITHUB_SHA::7} .
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_PASSWORD }}"
      - name: Push Docker Image
        run: "docker push eliassal/pyapp:${GITHUB_SHA::7}"
      - name: Install yq
        uses: mikefarah/yq@v4.44.3
      - name: Update deployment.yml with latest docker tag
        run: |
          # Short commit hash
          SHORT_SHA=${GITHUB_SHA::7}
          # Update image tag in deployment.yaml
          yq -i '.spec.template.spec.containers[0].image = "eliassal/pyapp:'"$SHORT_SHA"'"' ./k8s/pyapp-deployment.yml
      - name: Commit deployment file changes
        run: |
            git config user.name "eliassal"
            git config user.email "salamadmin@free.fr"
            git add k8s/pyapp-deployment.yml
            git commit -m 'docker tag updated by GHA' || echo "Already commited changes"
            git push origin main